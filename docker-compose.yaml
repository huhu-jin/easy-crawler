services:
  firecrawl:
    image: mcp/firecrawl
    container_name: firecrawl-mcp-server1
    environment:
      HOST: "0.0.0.0"
      FIRECRAWL_API_URL: "http://127.0.0.1:5002/v1"
      FIRECRAWL_RETRY_MAX_ATTEMPTS: "5"
      FIRECRAWL_RETRY_INITIAL_DELAY: "2000"
      FIRECRAWL_RETRY_MAX_DELAY: "30000"
      FIRECRAWL_RETRY_BACKOFF_FACTOR: "3"
      FIRECRAWL_CREDIT_WARNING_THRESHOLD: "2000"
      FIRECRAWL_CREDIT_CRITICAL_THRESHOLD: "500"
      HTTP_STREAMABLE_SERVER: "true"
      PORT: "8080"
    stdin_open: true
    tty: false
    restart: "no"
    ports:
      - "8080:8080"
    networks:
      - backend

networks:
  backend:
    driver: bridge


